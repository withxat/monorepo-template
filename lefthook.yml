pre-commit:
  parallel: true
  jobs:
    - name: lint & format
      glob: '*.{js,ts,jsx,tsx,astro,htm,html,json,yml,yaml,toml,css,pcss,postcss,less,scss,md,xml,svg,gql,graphql}'
      run: pnpm exec eslint {staged_files} --fix --no-warn-ignored
      stage_fixed: true

    - name: typecheck
      run: pnpm exec tsc --noEmit
      glob: '**/*.{ts,tsx,js,jsx}'
